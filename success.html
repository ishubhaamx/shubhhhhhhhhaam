<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You Said Yes!</title>

<style>
body {
    text-align: center;
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(to right, #ff9a9e, #fecfef);
    padding: 20px;
    color: #fff;
}

h1 {
    margin-top: 50px;
    font-size: 32px;
}

p {
    font-size: 20px;
    margin-top: 20px;
}

.heart {
    font-size: 40px;
    animation: bounce 1s infinite alternate;
}

@keyframes bounce {
    from {transform: translateY(0);}
    to {transform: translateY(-20px);}
}
</style>
</head>

<body>

<h1>Yayyy!! 💖🥹</h1>

<div class="heart">💘 💕 💖 💞</div>

<p>You just made my whole day 😍</p>
<p>I knew you loved me 😏💖</p>
<p>You’re the cutest person ever 🥺💕</p>
<p>Now I’m smiling like crazy 😆💞</p>
<p>I’m never letting you go 😌❤️</p>

</body>
</html>
